<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="同じ画像をぼかして背景へ広げるカードホバーのデモ">
    <title>ぼかし背景で世界観を広げるカードホバー</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="demo-page">
      <section class="demo-stage" aria-labelledby="demo-title">
        <header class="demo-header">
          <div>
            <p class="demo-kicker">Interaction study / 013</p>
            <h1 id="demo-title">画像の空気まで、<br>カードいっぱいに。</h1>
          </div>
          <p class="demo-lead">カードにマウスを重ねるか、Tabキーでフォーカスしてください。前景は鮮明なまま、同じ画像を使った背景だけがゆっくり広がります。</p>
        </header>

        <div class="demo-surface">
          <a class="immersive-card" href="#demo-title" style="--art: url('./poster.svg')" aria-label="架空作品『静かな軌道』の詳細を見る">
            <span class="immersive-card__atmosphere" aria-hidden="true"></span>

            <span class="immersive-card__visual">
              <img src="./poster.svg" width="720" height="960" alt="青い惑星と光の軌道を描いた抽象的な作品ビジュアル">
            </span>

            <span class="immersive-card__copy">
              <span class="immersive-card__eyebrow">ORIGINAL STORY / 01</span>
              <strong>静かな軌道</strong>
              <span class="immersive-card__meta">
                <span>2026</span>
                <span class="immersive-card__rule" aria-hidden="true"></span>
                <span>Visual experiment</span>
              </span>
            </span>
          </a>

          <div class="demo-note" aria-hidden="true">
            <span>Hover / Focus</span>
            <svg viewBox="0 0 64 24" role="img">
              <path d="M1 12h58M49 3l10 9-10 9"/>
            </svg>
            <span>同じ絵を背景へ</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
